project:
  name: hot3d_hand_lwm_stage1_pilot50_idm_a1
  seed: 42

data:
  train_manifest: /data/chy/hot3d_hand_lwm/pilot50/train.jsonl
  val_manifest: /data/chy/hot3d_hand_lwm/pilot50/val.jsonl
  fps: 30
  context_length: 4
  future_length: 12
  stride_frames: 4
  hand_state_dim: 24
  num_hand_joints: 21
  num_contact_points: 5
  coordinate_frame: clip_initial_wrist
  num_workers: 4

model:
  latent_action_dim: 64
  hidden_dim: 256
  encoder_layers: 4
  decoder_layers: 4
  num_heads: 8
  ffn_dim: 1024
  dropout: 0.1
  residual_prediction: true
  wrist_constant_velocity_anchor: true
  # IDM-A1 only: training-time linear probe from teacher latent mean to the
  # 12x3 future wrist correction relative to constant-velocity extrapolation.
  wrist_aware_auxiliary_head: true

training:
  device: cuda
  precision: bf16
  batch_size: 64
  epochs: 100
  lr: 0.0002
  weight_decay: 0.01
  grad_clip_norm: 1.0
  checkpoint_dir: /data/chy/hot3d_hand_lwm/pilot50_idm_a1/stage1_checkpoints
  loss_weights:
    state: 1.0
    wrist_translation: 5.0
    wrist_rotation: 0.5
    mano_pose: 0.5
    joints: 0.0
    contact: 0.0
    velocity: 0.2
    acceleration: 0.05
    kl: 0.0001
    latent_l2: 0.00001
    # Same scale as the existing wrist-translation reconstruction term.
    la_wrist_cv_correction: 5.0

evaluation:
  metrics:
    - wrist_ade_mm
    - wrist_fde_mm
    - rotation6d_mae
    - mano_pca_mae
