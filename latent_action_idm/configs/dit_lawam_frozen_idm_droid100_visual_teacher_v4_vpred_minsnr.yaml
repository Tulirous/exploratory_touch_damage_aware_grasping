project:
  name: droid100_dit_lawam_frozen_visual_teacher_v4_vpred_minsnr
  seed: 42

data:
  latent_manifest: data/manifests/droid100_train.jsonl
  val_manifest: data/manifests/droid100_val.jsonl
  state_dim: 7
  num_workers: 2
  visual_normalization:
    enabled: true
    stats_path: data/latents/dino_droid100_visual_stats.npz
    eps: 1.0e-6
    overwrite: false

model:
  visual_token_dim: 768
  max_visual_tokens: 512
  state_dim: 7
  latent_action_dim: 128
  hidden_dim: 768
  encoder_layers: 8
  decoder_layers: 10
  num_heads: 12
  ffn_dim: 3072
  dropout: 0.2
  use_state_in_idm: false
  num_views: 2

diffusion:
  num_steps: 1000
  beta_start: 0.0001
  beta_end: 0.02
  # Supported values: epsilon, x0, v.
  prediction_type: v
  # Supported values: uniform, logit_normal.
  timestep_sampling: logit_normal
  train_timestep_min: 0
  train_timestep_max: 999
  logit_normal_mean: 0.0
  logit_normal_std: 1.0
  min_snr_gamma: 5.0

training:
  device: cuda
  batch_size: 4
  epochs: 100
  lr: 0.0001
  weight_decay: 0.01
  idm_checkpoint: checkpoints/latent_action_idm_droid100_visual_teacher_v4/best.pt
  loss_noise: 1.0
  loss_state: 0.0
  loss_kl: 0.0
  loss_action_smooth: 0.0
  checkpoint_dir: checkpoints/dit_lawam_frozen_idm_droid100_visual_teacher_v4_vpred_minsnr
