project:
  name: droid100_lawam_stage1_idm_teacher_v2
  seed: 42

data:
  episode_manifest: data/manifests/droid100_episodes.jsonl
  latent_manifest: data/manifests/droid100_train.jsonl
  val_manifest: data/manifests/droid100_val.jsonl
  latent_dir: data/latents/dino_droid100
  fps: 15
  future_offset_frames: 15
  stride_frames: 8
  max_windows_per_episode: null
  state_dim: 7
  num_workers: 2

dino:
  backend: transformers
  model_name: /data/chy/huggingface/dinov3-vitb16
  image_size: 224
  feature_mode: patch_tokens
  num_prefix_tokens: 1
  view_fusion: concat
  num_visual_tokens: 400
  visual_token_dim: 768
  device: cuda
  precision: fp16

model:
  visual_token_dim: 768
  max_visual_tokens: 512
  state_dim: 7
  # Larger LA space for a stronger teacher. This does not bind the teacher to
  # DROID raw actions; it only gives q(z | u_t, u_T, state_t) more capacity.
  latent_action_dim: 256
  hidden_dim: 768
  encoder_layers: 12
  decoder_layers: 12
  num_heads: 12
  ffn_dim: 3072
  dropout: 0.1

training:
  device: cuda
  batch_size: 8
  epochs: 200
  lr: 0.00005
  min_lr: 0.000005
  lr_schedule: cosine
  weight_decay: 0.01
  grad_clip_norm: 1.0
  loss_future_latent: 1.0
  loss_state: 0.1
  loss_kl: 0.00005
  loss_action_smooth: 0.00005
  checkpoint_dir: checkpoints/latent_action_idm_droid100_teacher_v2
